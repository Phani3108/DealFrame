services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporalos
      POSTGRES_PASSWORD: temporalos
      POSTGRES_DB: temporalos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporalos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://temporalos:temporalos@postgres:5432/temporalos
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /tmp/temporalos:/tmp/temporalos
    command: uvicorn temporalos.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
